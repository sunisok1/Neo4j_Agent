services:
  neo4j:
    image: neo4j:5.26-community
    container_name: neo4j-local-instance
    restart: unless-stopped
    ports:
      - "${LOCAL_NEO4J_HTTP_PORT:-7474}:7474"
      - "${LOCAL_NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${LOCAL_NEO4J_USERNAME:-neo4j}/${LOCAL_NEO4J_PASSWORD:-local-neo4j-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./import:/import
